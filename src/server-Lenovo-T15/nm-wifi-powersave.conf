# /etc/NetworkManager/conf.d/wifi-powersave.conf — managed by t15
#
# Disable WiFi power-save on this device.
#
# Why: the Intel iwlwifi driver + power-save + multi-BSSID "roaming" SSIDs
# (building Wi-Fi networks with several APs sharing the same name) is a known
# reliability problem on Linux. The card misses beacon frames while dozing,
# fails to roam cleanly between APs, and gets stuck in long auth-timeout loops
# (3 retries per BSSID, ~10s per BSSID, several BSSIDs tried, ~4-5 min total
# downtime). systemd sees nothing wrong because the WiFi service is technically
# fine — the card is just unresponsive. The t15-watchdog can't fix this either.
#
# wifi.powersave values:
#   0 use default        1 ignore (don't touch)
#   2 disable (we want this)
#   3 enable             4 default
#
# Sets the default for *new* NM connection profiles. Existing profiles keep
# their stored value — `t15 deploy` also runs `nmcli connection modify ... 2`
# on every existing wifi connection so this takes effect without a reboot.

[connection]
wifi.powersave = 2
