# /etc/NetworkManager/conf.d/unmanaged.conf — managed by t15
#
# Tell NetworkManager not to touch interfaces we own:
#   wg0       — WireGuard tunnel, managed by wg-quick@wg0.service
#   enp0s31f6 — LAN to MR550, statically configured by t15-lan.service
#
# wlp0s20f3 (building WiFi WAN) intentionally stays NM-managed so NM handles
# Wi-Fi association, captive portals, and roaming.

[keyfile]
unmanaged-devices=interface-name:wg0;interface-name:enp0s31f6
