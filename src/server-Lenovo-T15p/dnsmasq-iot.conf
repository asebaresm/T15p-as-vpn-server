# dnsmasq — DHCP + DNS for IoT LAN (enp0s31f6 → MR550 AP → IoT devices)
# Drop this file in /etc/dnsmasq.d/

interface=enp0s31f6
interface=wg0
bind-interfaces

# DHCP range — 150 addresses, 24h lease
dhcp-range=192.168.10.50,192.168.10.200,24h

# Tell clients to use the T15p as gateway and DNS
dhcp-option=3,192.168.10.1
dhcp-option=6,192.168.10.1

# Local domain
domain=iot.local
local=/iot.local/

# Upstream DNS (used for IoT clients' queries)
server=1.1.1.1
server=9.9.9.9

# Log DHCP leases
log-dhcp
