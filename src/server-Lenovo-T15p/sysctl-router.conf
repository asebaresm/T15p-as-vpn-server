# /etc/sysctl.d/99-router.conf
# Enable IP forwarding for router/NAT functionality

net.ipv4.ip_forward = 1

# Disable IPv6 forwarding (not used)
net.ipv6.conf.all.forwarding = 0

# Ignore ICMP redirects (we're a router, not a client)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0

# Reverse path filtering — loose mode on WAN (needed for asymmetric routing)
net.ipv4.conf.wlp0s20f3.rp_filter = 2
net.ipv4.conf.enp0s31f6.rp_filter = 1
# net.ipv4.conf.wwan0.rp_filter = 2  # uncomment when LTE card installed
