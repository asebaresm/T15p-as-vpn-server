# hostapd configuration for IoT LAN access point
# Interface: ap0 (virtual interface on top of wlp0s20f3)
#
# IMPORTANT — same-channel constraint:
# The Intel AX201 CNVi supports STA+AP only on the same channel (#channels <= 1).
# The channel line below is updated automatically at runtime by the NM dispatcher
# script (nm-dispatcher/99-hostapd-channel) whenever wlp0s20f3 connects to the
# building WiFi. Do not set a fixed channel here.

interface=ap0
driver=nl80211
ssid=Huawey-5
hw_mode=g
channel=6
ieee80211n=1
wmm_enabled=1

# WPA2 only
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
wpa_passphrase=CHANGEME_STRONG_PASSPHRASE

logger_syslog=-1
logger_syslog_level=2
