#!/usr/sbin/nft -f
# nftables — firewall + NAT for T15p router
#
# Interfaces:
#   wlp0s20f3  — WAN (building WiFi, STA mode)
#   ap0        — LAN (IoT access point, 192.168.10.0/24)
#   wg0        — WireGuard VPN tunnel (10.100.0.0/24)
#
# LTE backup (wwan0) — not active yet, see configs/lte/
# Uncomment wwan0 references below once the SIM card is installed.

flush ruleset

table inet filter {

    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback
        iifname lo accept

        # Established/related
        ct state established,related accept

        # ICMP — allow ping and path MTU discovery
        ip protocol icmp icmp type { echo-request, destination-unreachable, time-exceeded } accept

        # Allow everything from IoT LAN (DHCP, DNS handled by dnsmasq)
        iifname ap0 accept

        # Allow SSH only from within the VPN
        iifname wg0 tcp dport 22 accept

        # WireGuard inbound from VPN (needed for wg0 to come up)
        # wg0 traffic is already handled above; WireGuard UDP is on wlp0s20f3
        # but it's outbound-initiated — ct state established covers the response

        # Drop everything else
        drop
    }

    chain forward {
        type filter hook forward priority 0; policy drop;

        # IoT LAN → WAN (internet access for IoT devices)
        iifname ap0 oifname wlp0s20f3 accept
        # iifname ap0 oifname wwan0 accept  # uncomment when LTE card installed

        # Allow return traffic
        ct state established,related accept
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}

table ip nat {

    chain postrouting {
        type nat hook postrouting priority 100;

        # Masquerade IoT traffic going out to WAN
        oifname wlp0s20f3 masquerade
        # oifname wwan0 masquerade  # uncomment when LTE card installed
    }
}
