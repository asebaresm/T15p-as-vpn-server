[Interface]
PrivateKey = {{VPS_PRIVATE_KEY}}
Address = 10.100.0.1/24
ListenPort = 51820
# Prevent wg-quick from adding routes for AllowedIPs (we handle routing manually)
Table = off
# Forward VPN traffic and route MacBook internet to T15 (double-hop)
PostUp   = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT; ip rule add from 10.100.0.0/24 table 100; ip route add default via 10.100.0.2 table 100 2>/dev/null || true
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT; ip rule del from 10.100.0.0/24 table 100 2>/dev/null || true; ip route del default via 10.100.0.2 table 100 2>/dev/null || true

[Peer]
# T15 (0.0.0.0/0 routes MacBook internet traffic to T15 for double-hop)
PublicKey = {{T15_PUBLIC_KEY}}
AllowedIPs = 10.100.0.2/32, 0.0.0.0/0

[Peer]
# MacBook
PublicKey = {{MACBOOK_PUBLIC_KEY}}
AllowedIPs = 10.100.0.3/32

[Peer]
# Android
PublicKey = {{ANDROID_PUBLIC_KEY}}
AllowedIPs = 10.100.0.4/32
